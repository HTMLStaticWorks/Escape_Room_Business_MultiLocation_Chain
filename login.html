<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EscapeX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative;">
    <!-- Top Right Toggles -->
    <div class="position-absolute top-0 end-0 p-4 d-flex gap-2 z-3">
        <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle" style="width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;" aria-label="Toggle Theme">
            <i class="bi bi-sun fs-5"></i>
        </button>
        <button onclick="document.dir = document.dir === 'rtl' ? 'ltr' : 'rtl';" class="btn btn-outline-secondary fw-bold rounded-pill px-3" style="height: 44px;">
            RTL
        </button>
    </div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="custom-card p-4">
                    <div class="text-center mb-4">
                        <a class="navbar-brand fs-2 fw-bold text-decoration-none" href="index.html">
                            <i class="bi bi-door-closed-fill me-2 text-primary"></i> EscapeX
                        </a>
                    </div>
                    <h3 class="text-center mb-4">Welcome Back</h3>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="********">
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-primary text-decoration-none small">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 mb-3" style="padding: 12px 16px; font-size: 0.95rem;">Login</button>
                    </form>
                    
                    <div class="text-center mb-3 text-muted">Or login with</div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary w-50"><i class="bi bi-google"></i> Google</button>
                        <button class="btn btn-outline-secondary w-50"><i class="bi bi-facebook"></i> Facebook</button>
                    </div>
                    
                    <div class="text-center mt-4">
                        <span class="text-muted">Don't have an account?</span> <a href="register.html" class="text-primary text-decoration-none">Sign up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Back to top -->
    <div id="backToTop" class="back-to-top">
        <i class="bi bi-arrow-up"></i>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
